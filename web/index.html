<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twelfth Night · Embodied AI Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="magic-fx"></canvas>
<div id="nebula"></div>

<!-- ══════════════════════════════════════════
     Top Bar
══════════════════════════════════════════ -->
<div id="topbar">
    <div class="logo">TWELFTH NIGHT</div>
    <button class="tb-btn" onclick="goScene('s1')">DIVINE</button>
    <button class="tb-btn" onclick="toggleGarden()">GARDEN</button>
    <button class="tb-btn" onclick="openSettings()">SETTINGS</button>
    <div id="garden-nav-btn" onclick="toggleGarden()">
        <span class="plant-mini">🌱</span>
        <span id="growth-badge">0</span>
    </div>
</div>

<!-- ══════════════════════════════════════════
     Sprite Companion
══════════════════════════════════════════ -->
<div id="sprite" onclick="spriteClick()">
    <div id="sprite-container">
        <svg id="sp-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="rgba(106,90,205,0.3)" stroke="rgba(212,175,55,0.6)" stroke-width="2"/>
            <circle cx="38" cy="42" r="8" fill="white"/>
            <circle cx="62" cy="42" r="8" fill="white"/>
            <circle cx="38" cy="44" r="4" fill="#1a1a2e"/>
            <circle cx="62" cy="44" r="4" fill="#1a1a2e"/>
            <path d="M 42 62 Q 50 72 58 62" fill="none" stroke="rgba(212,175,55,0.8)" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <img id="sp-img" alt="Custom Companion">
        <div id="sprite-emotion"></div>
        <div id="sprite-upload-hint">UPLOAD</div>
    </div>
</div>
<div id="sprite-bubble"></div>
<div id="guide-steps"></div>

<!-- ══════════════════════════════════════════
     Scene: Welcome
══════════════════════════════════════════ -->
<div class="scene" id="s0">
    <div class="med-orb"></div>
    <div class="med-text">ARCANUM</div>
    <button class="btn-magic" onclick="goScene('s1')">TOUCH THE VOID</button>
</div>

<!-- ══════════════════════════════════════════
     Scene: Category Selection
══════════════════════════════════════════ -->
<div class="scene" id="s1">
    <div style="display:flex; gap:30px; flex-wrap:wrap; justify-content:center; padding-top:30px">
        <div class="cat-card glass-panel" onclick="pickCat('Wealth','#d4af37')">
            <span class="icon">💰</span><div style="color:var(--g); letter-spacing:4px">WEALTH</div>
        </div>
        <div class="cat-card glass-panel" onclick="pickCat('Study','#00ccff')">
            <span class="icon">📚</span><div style="color:#00ccff; letter-spacing:4px">STUDY</div>
        </div>
        <div class="cat-card glass-panel" onclick="pickCat('Love','#ff88aa')">
            <span class="icon">💕</span><div style="color:#ff88aa; letter-spacing:4px">LOVE</div>
        </div>
        <div class="cat-card glass-panel" onclick="pickCat('General','#00dd77')">
            <span class="icon">🌟</span><div style="color:#00dd77; letter-spacing:4px">GENERAL</div>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     Scene: Card Deck (3D)
══════════════════════════════════════════ -->
<div class="scene" id="s2">
    <div id="magic-dot"></div>
    <div id="magic-array"></div>
    <div id="scene-3d"></div>
    <div style="position:absolute; bottom:40px; color:var(--g); letter-spacing:3px; font-size:12px">
        MOVE HAND · FIST TO LOCK
    </div>
</div>

<!-- ══════════════════════════════════════════
     Scene: Meditation / Breathing
══════════════════════════════════════════ -->
<div class="scene" id="s3">
    <div class="med-orb" id="med-orb"></div>
    <div id="breath-hint" style="color:var(--g); letter-spacing:6px; font-size:14px; margin-top:20px">INHALE</div>
</div>

<!-- ══════════════════════════════════════════
     Scene: Oracle Result
══════════════════════════════════════════ -->
<div class="scene" id="s4">
    <div id="oracle-container" style="width:100%; max-width:850px; overflow-y:auto; max-height:80vh; padding:20px"></div>
    <button class="tb-btn" style="margin-top:20px" onclick="updateGrowth();goScene('s1')">AGAIN</button>
</div>

<!-- ══════════════════════════════════════════
     Psionic Garden Modal
══════════════════════════════════════════ -->
<div id="s_garden">
    <div class="garden-panel">
        <div class="garden-title">PSIONIC GARDEN</div>
        <div id="plant-stage"><div class="soil"></div></div>
        <div class="garden-progress">
            <div class="gp-label">
                <span class="stage-name" id="stage-name">VOID SEED</span>
                <span class="stage-points" id="stage-points">0</span>
            </div>
            <div class="gp-bar-track"><div class="gp-bar-fill" id="gp-bar-fill"></div></div>
        </div>
        <div class="garden-stages" id="garden-stages"></div>
        <div class="garden-stats">
            <div class="gs-stat"><div class="sv" id="stat-readings">0</div><div class="sl">READINGS</div></div>
            <div class="gs-stat"><div class="sv" id="stat-stage">1</div><div class="sl">STAGE</div></div>
        </div>
        <button class="tb-btn" onclick="toggleGarden()">CLOSE GARDEN</button>
    </div>
</div>
<div id="achievement-popup"><div class="ach-icon"></div><div class="ach-title"></div><div class="ach-desc"></div></div>

<!-- ══════════════════════════════════════════
     Settings Modal
══════════════════════════════════════════ -->
<div id="settings-modal">
    <div class="settings-panel">
        <div style="color:var(--g); letter-spacing:6px; font-size:18px; margin-bottom:30px">SETTINGS</div>
        <input id="api-input" placeholder="SiliconFlow API Key" type="password">
        <div class="sprite-upload-zone" onclick="document.getElementById('sprite-upload-input').click()">
            <div class="sprite-preview-default" id="sprite-preview-def">🧚</div>
            <img class="sprite-preview" id="sprite-preview-img" style="display:none">
            <div class="sprite-upload-text">
                <h4>COMPANION IMAGE</h4>
                <p>Upload custom sprite</p>
            </div>
        </div>
        <input type="file" id="sprite-upload-input" accept="image/*" style="display:none" onchange="handleSpriteUpload(event)">
        <div style="display:flex; gap:15px">
            <button class="tb-btn" style="flex:1; height:50px; margin:0" onclick="clearSpriteImage()">CLEAR</button>
            <button class="tb-btn" style="flex:2; height:50px; margin:0; background:rgba(212,175,55,0.1)" onclick="saveSettings()">BIND CONTRACT</button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     Intro Canvas & Curtain
══════════════════════════════════════════ -->
<canvas id="intro-canvas"></canvas>
<div id="curtain-container">
    <div class="curtain-panel" id="curtain-left"></div>
    <div class="curtain-panel" id="curtain-right"></div>
    <div id="curtain-seal">❂</div>
</div>

<!-- ══════════════════════════════════════════
     Scripts — loaded in dependency order
══════════════════════════════════════════ -->
<script src="scripts/app.js"></script>
<script src="scripts/gesture.js"></script>
<script src="scripts/aiClient.js"></script>
<script src="scripts/hardwareClient.js"></script>
</body>
</html>
